{% extends 'base.html' %}
{% load static %}
{% block content %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400" rel="stylesheet" />
    <link href="{% static 'pr/fontawesome/css/all.min.css" rel="stylesheet" />
    <link href="{% static 'pr/css/templatemo-comparto.css" rel="stylesheet" />
    <title>Product Details</title>
    <style>
        /* Responsive image */
        #over img {
            margin-left: auto;
            margin-right: auto;
            display: block;
          }

        /* Handling content overflow for long descriptions */
        .content-description {
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .content-full {
            display: none;
        }

        /* Toggle button */
        .show-more-btn {
            cursor: pointer;
            color: #2196F3;
        }

        @media (max-width: 768px) {
            .tm-section-1-l {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>
    <br><br>
    <section class="tm-mb-1" id="about">
        <div class="tm-row tm-about-row col-md-12 b ">
            <!-- Product Image -->
            <div class="tm-section-1-l col-md-6 image-container ">
                <img src="{{ pr.img.url }}" alt="Product Image"  class="product-img d-flex tm-img-responsive  " style="width: 45%; border-radius: 8%">
            </div>
            
            <!-- Product Details -->
            <div class="col-md-6">
                <article class=" tm-bg-color-8">
                    <h2 class="tm-mb-2 tm-title-color">{{ pr.name }}</h2>
                    <p>Price: {{ pr.price }} Rs</p>
                    
                    <div class="content-description">
                        <p>{{ pr.desc }}</p>
                    </div>
                    
                    <div class="content-full">
                        <p>{{ pr.desc }}</p>
                       
                    </div>
                    <span  class="show-more-btn"  onclick="toggleContent()" >Show more</span>
                    <br>
                    <p>Stock: {{ pr.stock }}</p>
                   
                    {% if pr.stock <= 0 %}
                        <h2 style="color:red;">Sorry, no stock left.</h2>
                    {% else %}
                        <a href="{% url 'add_cart' pr.id %}" class="tm-btn tm-btn-1 btn btn-danger tm-link-to-services">Add to cart</a>
                    {% endif %}
                    
       
                </article>
            </div>
        </div>
    </section>
    <script>
        function toggleContent() {
            var contentDescription = document.querySelector('.content-description');
            var contentFull = document.querySelector('.content-full');
            var showMoreButton = document.querySelector('.show-more-btn');
            
            if (contentDescription.style.display === 'none') {
                contentDescription.style.display = 'block';
                contentFull.style.display = 'none';
                showMoreButton.textContent = 'Show more';
            } else {
                contentDescription.style.display = 'none';
                contentFull.style.display = 'block';
                showMoreButton.textContent = 'Show less';
            }
        }
    </script>
</body>
</html>
{% endblock %}
