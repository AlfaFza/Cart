{% extends 'base.html' %}
{% load static %}
{% block content %}

<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; background-color: #f9f9f9; padding: 20px;">
    <div style="text-align: center; background-color: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 30px 20px; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1); max-width: 500px; width: 100%;">
        <h1 style="color: #24a19c; font-size: 24px; font-weight: bold; margin-bottom: 15px;">Order Submitted Successfully!</h1>
        <p style="color: #333; font-size: 18px; margin-bottom: 20px;">Thank you for your order. Your order details are as follows:</p>
        <hr style="border: 0; height: 1px; background-color: #ddd; margin: 20px 0;">
        <p style="color: #555; font-size: 16px; margin-bottom: 30px;">You will receive a confirmation email with your order details shortly.</p>
        <a href="{% url 'home' %}" style="display: inline-block; background-color: #24a19c; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; transition: background-color 0.3s ease;">Back to Home</a>
    </div>
</div>

{% endblock %}
